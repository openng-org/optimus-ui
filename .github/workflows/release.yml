name: Release

# Publishes every package in packages/* to npm when a semver tag is pushed (with or
# without a leading "v", e.g. "1.0.0-rc.2" or "v1.0.0-rc.2"), then updates CHANGELOG.md,
# commits the version bumps back to main and creates a GitHub release.
#
# Security model:
#   - npm authentication uses trusted publishing (OIDC): there is NO npm token stored in
#     this repository or its secrets. Each @openng/* package must list this repository and
#     this workflow file (release.yml) as a trusted publisher on npmjs.com. Renaming this
#     file breaks publishing until that configuration is updated.
#   - Provenance attestations are generated automatically by npm for OIDC publishes.
#   - Top-level permissions are dropped; each job requests only what it needs.
#   - Third-party actions are pinned to commit SHAs.

on:
    push:
        tags:
            - 'v[0-9]*'
            - '[0-9]*.[0-9]*.[0-9]*'

permissions: {}

concurrency:
    group: release
    cancel-in-progress: false

jobs:
    publish:
        name: Publish packages to npm
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write # required for npm trusted publishing (OIDC)
        outputs:
            tag: ${{ steps.meta.outputs.tag }}
            version: ${{ steps.meta.outputs.version }}
            dist_tag: ${{ steps.meta.outputs.dist_tag }}
            prerelease: ${{ steps.meta.outputs.prerelease }}
        steps:
            - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
              with:
                  fetch-depth: 0

            - name: Validate tag and derive release metadata
              id: meta
              run: |
                  TAG="$GITHUB_REF_NAME"
                  VERSION="${TAG#v}"
                  if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'; then
                      echo "::error::Tag '$TAG' is not a valid semver release tag"
                      exit 1
                  fi
                  if ! git merge-base --is-ancestor HEAD origin/main; then
                      echo "::error::Tag '$TAG' does not point to a commit on main; refusing to publish"
                      exit 1
                  fi
                  if printf '%s' "$VERSION" | grep -q -- '-'; then
                      PRE="${VERSION#*-}"
                      DIST_TAG="${PRE%%.*}"
                      PRERELEASE=true
                  else
                      DIST_TAG=latest
                      PRERELEASE=false
                  fi
                  {
                      echo "tag=$TAG"
                      echo "version=$VERSION"
                      echo "dist_tag=$DIST_TAG"
                      echo "prerelease=$PRERELEASE"
                  } >> "$GITHUB_OUTPUT"
                  echo "Publishing $VERSION to npm dist-tag '$DIST_TAG'"

            - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
              with:
                  run_install: false

            - name: Use Node.js 24.x
              uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
              with:
                  node-version: 24.x
                  cache: 'pnpm'

            - name: Install packages
              run: pnpm install

            - name: Set package versions from tag
              env:
                  VERSION: ${{ steps.meta.outputs.version }}
              run: node scripts/set-version.mjs "$VERSION"

            - name: Format and audit checks
              run: pnpm run build:check

            - name: Build packages
              run: |
                  pnpm run build:optimus-ui
                  pnpm run build:lib

            - name: Unit tests
              run: pnpm --filter @openng/optimus-ui test:unit

            - name: Publish to npm (trusted publishing, all packages)
              env:
                  DIST_TAG: ${{ steps.meta.outputs.dist_tag }}
              run: pnpm -r publish --filter './packages/*' --no-git-checks --report-summary --tag "$DIST_TAG"

    changelog:
        name: Update changelog and create GitHub release
        runs-on: ubuntu-latest
        needs: publish
        permissions:
            contents: write # push the release commit to main + create the GitHub release
        env:
            TAG: ${{ needs.publish.outputs.tag }}
            VERSION: ${{ needs.publish.outputs.version }}
        steps:
            - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
              with:
                  ref: main
                  fetch-depth: 0

            - name: Use Node.js 24.x
              uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
              with:
                  node-version: 24.x

            - name: Set package versions from tag
              run: node scripts/set-version.mjs "$VERSION"

            - name: Generate changelog entry
              run: node scripts/generate-changelog.mjs --tag "$TAG" --notes-out /tmp/release-notes.md

            - name: Commit version bumps and changelog to main
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add CHANGELOG.md package.json packages/*/package.json
                  if git diff --cached --quiet; then
                      echo "Nothing to commit"
                  else
                      git commit -m "chore(release): $TAG"
                      for attempt in 1 2 3; do
                          if git push origin HEAD:main; then
                              break
                          fi
                          echo "Push failed (attempt $attempt), rebasing on latest main and retrying"
                          git pull --rebase origin main
                      done
                  fi

            - name: Create GitHub release
              env:
                  GH_TOKEN: ${{ github.token }}
                  PRERELEASE: ${{ needs.publish.outputs.prerelease }}
              run: |
                  EXTRA_ARGS=()
                  if [ "$PRERELEASE" = "true" ]; then
                      EXTRA_ARGS+=(--prerelease)
                  fi
                  gh release create "$TAG" --verify-tag --title "$TAG" --notes-file /tmp/release-notes.md "${EXTRA_ARGS[@]}"
