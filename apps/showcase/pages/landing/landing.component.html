<div class="landing" [ngClass]="landingClass()">

        <span style="font-weight: 600; line-height: 1.5;">Optimus UI is a community MIT licensed fork of PrimeNG, now closed source and using a commercial license.</span>

    <app-topbar [showConfigurator]="true" [showMenuButton]="false" />
